name: Deploy to Railway

on:
  push:
    branches: [ main ]

jobs:
  deploy-auth-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build auth-service
        run: |
          cd auth-service
          mvn clean package -DskipTests

      - name: Deploy auth-service to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: auth-service

  deploy-apunte-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build apunte-service
        run: |
          cd apunte-service
          mvn clean package -DskipTests

      - name: Deploy apunte-service to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: apunte-service

  deploy-materia-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build materia-service
        run: |
          cd materia-service
          mvn clean package -DskipTests

      - name: Deploy materia-service to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: materia-service

  deploy-api-gateway:
    runs-on: ubuntu-latest
    needs: [deploy-auth-service, deploy-apunte-service, deploy-materia-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build api-gateway
        run: |
          cd api-gateway
          mvn clean package -DskipTests

      - name: Deploy api-gateway to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: api-gateway