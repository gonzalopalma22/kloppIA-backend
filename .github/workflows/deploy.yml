name: Deploy to Railway

on:
  push:
    branches: [ main ]

jobs:
  deploy-auth-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build auth-service
        run: |
          cd auth-service
          mvn clean package -DskipTests

      - name: Deploy auth-service
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          curl -fsSL https://railway.com/install.sh | bash
          source "$HOME/.railway/env"
          cd auth-service
          railway up --service auth-service --project ${{ secrets.RAILWAY_PROJECT_ID }} --enviroment production

  deploy-apunte-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build apunte-service
        run: |
          cd apunte-service
          mvn clean package -DskipTests

      - name: Deploy apunte-service
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          curl -fsSL https://railway.com/install.sh | bash
          source "$HOME/.railway/env"
          cd apunte-service
          railway up --service apunte-service --project ${{ secrets.RAILWAY_PROJECT_ID }} --enviroment production

  deploy-materia-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build materia-service
        run: |
          cd materia-service
          mvn clean package -DskipTests

      - name: Deploy materia-service
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          curl -fsSL https://railway.com/install.sh | bash
          source "$HOME/.railway/env"
          cd materia-service
          railway up --service materia-service --project ${{ secrets.RAILWAY_PROJECT_ID }} --enviroment production

  deploy-api-gateway:
    runs-on: ubuntu-latest
    needs: [deploy-auth-service, deploy-apunte-service, deploy-materia-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build api-gateway
        run: |
          cd api-gateway
          mvn clean package -DskipTests

      - name: Deploy api-gateway
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          curl -fsSL https://railway.com/install.sh | bash
          source "$HOME/.railway/env"
          cd api-gateway
          railway up --service api-gateway --project ${{ secrets.RAILWAY_PROJECT_ID }} --enviroment production